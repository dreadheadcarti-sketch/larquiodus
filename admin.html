<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
🛠 Admin Panel
</header>

<div class="container">

  <div class="card">
    💰 Set Balance
    <button onclick="setBalance()">50.000$ setzen</button>
    <button onclick="reset()">Reset</button>
  </div>

  <div class="card">
    ⚡ Simulation Control
    <button onclick="speedUp()">Speed +</button>
  </div>

</div>

<script>
function setBalance(){
  localStorage.setItem("balance", 50000);
  alert("Balance gesetzt");
}

function reset(){
  localStorage.setItem("balance", 10000);
  alert("Reset gemacht");
}

function speedUp(){
  alert("Simulation Speed erhöht (Demo)");
}
</script>

</body>
</html>
