<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Larquiodus PRO</title>

<!-- PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #1b1640, #070A12);
  color: white;
}

header {
  padding: 18px;
  text-align: center;
  font-weight: bold;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(20px);
}

.container {
  padding: 15px;
  max-width: 900px;
  margin: auto;
}

.hero {
  background: linear-gradient(135deg, rgba(124,58,237,0.3), rgba(255,122,24,0.2));
  padding: 20px;
  border-radius: 20px;
  margin-bottom: 20px;
}

.coin {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(255,255,255,0.05);
  padding: 14px;
  border-radius: 15px;
  margin-bottom: 10px;
  backdrop-filter: blur(15px);
}

.coin img {
  width: 35px;
}

.right {
  font-weight: bold;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 15px;
}

button {
  padding: 12px;
  border-radius: 12px;
  border: none;
  font-weight: bold;
  background: linear-gradient(90deg, #7c3aed, #ff7a18);
  color: white;
  cursor: pointer;
}

.admin {
  text-align: center;
  margin-top: 20px;
}

.admin a {
  color: #aaa;
  text-decoration: none;
}

.green { color: #22c55e; }

/* Topbar */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(20px);
}

.menu {
  position: relative;
  font-size: 22px;
  cursor: pointer;
  padding: 5px 10px;
}

.dropdown {
  display: none;
  position: absolute;
  right: 0;
  top: 30px;
  background: rgba(20,20,30,0.95);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  min-width: 140px;
  overflow: hidden;
}

.dropdown a {
  display: block;
  padding: 10px;
  color: white;
  text-decoration: none;
  font-size: 14px;
}

.dropdown a:hover {
  background: rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<div class="topbar">
  <div class="title">💎 Larquiodus PRO</div>

  <div class="menu">
    ⋮
    <div class="dropdown">
      <a href="admin.html">⚙ Admin Panel</a>
    </div>
  </div>
</div>

<header>
💎 Larquiodus PRO Wallet
</header>

<div class="container">

  <div class="hero">
    <p>Total Balance</p>
    <h1 id="balance">$10,000.00</h1>
    <span id="change" class="green">▲ Loading...</span>
  </div>

  <h3>Assets</h3>

  <div class="coin">
    <img src="https://cryptologos.cc/logos/bitcoin-btc-logo.png">
    <div>
      <b>Bitcoin</b><br>
      <small>BTC</small>
    </div>
    <div class="right" id="btc">$0</div>
  </div>

  <div class="coin">
    <img src="https://cryptologos.cc/logos/ethereum-eth-logo.png">
    <div>
      <b>Ethereum</b><br>
      <small>ETH</small>
    </div>
    <div class="right" id="eth">$0</div>
  </div>

  <div class="coin">
    <img src="https://cryptologos.cc/logos/solana-sol-logo.png">
    <div>
      <b>Solana</b><br>
      <small>SOL</small>
    </div>
    <div class="right" id="sol">$0</div>
  </div>

  <div class="grid">
    <button onclick="buy()">BUY</button>
    <button onclick="sell()">SELL</button>
  </div>

  <div class="admin">
    <a href="admin.html">⚙ Admin Panel</a>
  </div>

</div>

<script>
let balance = 10000;

let btc = 50000;
let eth = 3000;
let sol = 120;

function update() {
  document.getElementById("balance").innerText = "$" + balance.toFixed(2);
  document.getElementById("btc").innerText = "$" + btc.toFixed(2);
  document.getElementById("eth").innerText = "$" + eth.toFixed(2);
  document.getElementById("sol").innerText = "$" + sol.toFixed(2);

  let change = ((Math.random() * 6) - 2).toFixed(2);
  document.getElementById("change").innerText = change + "% 24h";
}

function buy() {
  balance += 300;
  update();
}

function sell() {
  balance -= 200;
  update();
}

// Simulation
setInterval(() => {
  btc += (Math.random() - 0.5) * 1000;
  eth += (Math.random() - 0.5) * 100;
  sol += (Math.random() - 0.5) * 10;
  update();
}, 2500);

update();

// Dropdown menu
document.addEventListener("DOMContentLoaded", () => {
  const menu = document.querySelector(".menu");
  const dropdown = document.querySelector(".dropdown");

  menu.addEventListener("click", () => {
    dropdown.style.display =
      dropdown.style.display === "block" ? "none" : "block";
  });

  document.addEventListener("click", (e) => {
    if (!menu.contains(e.target)) {
      dropdown.style.display = "none";
    }
  });
});
</script>

</body>
</html>
