<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Larquiodus PRO</title>
<link rel="stylesheet" href="style.css">

<!-- PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>

<body>

<header>
💎 Larquiodus PRO Wallet
</header>

<div class="container">

  <!-- PORTFOLIO -->
  <div class="hero">
    <p>Total Balance</p>
    <h1 id="balance">$10,000.00</h1>
    <span id="change" class="green">▲ Loading...</span>
  </div>

  <!-- ASSETS -->
  <h3>Assets</h3>

  <div class="coin">
    <img src="https://cryptologos.cc/logos/bitcoin-btc-logo.png">
    <div>
      <b>Bitcoin</b><br>
      <small>BTC</small>
    </div>
    <div class="right" id="btc">$0</div>
  </div>

  <div class="coin">
    <img src="https://cryptologos.cc/logos/ethereum-eth-logo.png">
    <div>
      <b>Ethereum</b><br>
      <small>ETH</small>
    </div>
    <div class="right" id="eth">$0</div>
  </div>

  <div class="coin">
    <img src="https://cryptologos.cc/logos/solana-sol-logo.png">
    <div>
      <b>Solana</b><br>
      <small>SOL</small>
    </div>
    <div class="right" id="sol">$0</div>
  </div>

  <!-- ACTIONS -->
  <div class="grid">
    <button onclick="buy()">BUY</button>
    <button onclick="sell()">SELL</button>
  </div>

  <div class="admin">
    <a href="admin.html">⚙ Admin Panel</a>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
